services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    # Overrides .env for in-container networking (must bind 0.0.0.0, not localhost)
    environment:
      HTTP_HOST: "0.0.0.0"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_bot?schema=public
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
